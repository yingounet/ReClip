name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: ReClip
  BUNDLE_ID: com.reclip.app

jobs:
  build:
    runs-on: macos-14
    strategy:
      matrix:
        arch: [arm64, x86_64]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.2.app
    
    - name: Build for ${{ matrix.arch }}
      run: |
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          swift build -c release --arch arm64
          cp .build/arm64-apple-macosx/release/ReClip ReClip-arm64
        else
          swift build -c release --arch x86_64
          cp .build/x86_64-apple-macosx/release/ReClip ReClip-x86_64
        fi
    
    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: ReClip-${{ matrix.arch }}
        path: ReClip-${{ matrix.arch }}
    
  create-universal:
    needs: build
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/download-artifact@v4
      with:
        name: ReClip-arm64
        path: binaries/arm64
    
    - uses: actions/download-artifact@v4
      with:
        name: ReClip-x86_64
        path: binaries/x86_64
    
    - name: Create universal binary
      run: |
        lipo -create binaries/arm64/ReClip-arm64 binaries/x86_64/ReClip-x86_64 -output ReClip
        chmod +x ReClip
    
    - name: Create app bundle
      run: |
        mkdir -p ${{ env.APP_NAME }}.app/Contents/MacOS
        mkdir -p ${{ env.APP_NAME }}.app/Contents/Resources
        
        cp ReClip ${{ env.APP_NAME }}.app/Contents/MacOS/
        
        cat > ${{ env.APP_NAME }}.app/Contents/Info.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleExecutable</key>
            <string>ReClip</string>
            <key>CFBundleIdentifier</key>
            <string>${{ env.BUNDLE_ID }}</string>
            <key>CFBundleName</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSAppleEventsUsageDescription</key>
            <string>ReClip needs accessibility permission to paste content.</string>
        </dict>
        </plist>
        EOF
    
    - name: Copy icon to app bundle
      run: cp ReClip/Resources/AppIcon.icns ${{ env.APP_NAME }}.app/Contents/Resources/
    
    - name: Get version
      id: version
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Install create-dmg
      run: brew install create-dmg
    
    - name: Create DMG
      run: |
        create-dmg \
          --volname "${{ env.APP_NAME }}" \
          --volicon "ReClip/Resources/AppIcon.icns" \
          --window-pos 200 120 \
          --window-size 660 400 \
          --icon-size 100 \
          --icon "${{ env.APP_NAME }}.app" 180 170 \
          --hide-extension "${{ env.APP_NAME }}.app" \
          --app-drop-link 480 170 \
          "${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg" \
          "${{ env.APP_NAME }}.app"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-macOS
        path: ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg
    
  release:
    needs: create-universal
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: ReClip-macOS
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ReClip-*.dmg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
