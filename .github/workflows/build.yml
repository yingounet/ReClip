name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: ReClip
  BUNDLE_ID: com.reclip.app

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Select Xcode
      run: |
        set -euo pipefail
        echo "Using default developer directory: $(xcode-select -p)"
        xcodebuild -version
    
    - name: Build
      run: swift build -c release
    
    - name: Create app bundle
      run: |
        mkdir -p ${{ env.APP_NAME }}.app/Contents/MacOS
        mkdir -p ${{ env.APP_NAME }}.app/Contents/Resources
        
        cp .build/release/ReClip ${{ env.APP_NAME }}.app/Contents/MacOS/
        
        cat > ${{ env.APP_NAME }}.app/Contents/Info.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleExecutable</key>
            <string>ReClip</string>
            <key>CFBundleIdentifier</key>
            <string>${{ env.BUNDLE_ID }}</string>
            <key>CFBundleName</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSAppleEventsUsageDescription</key>
            <string>ReClip needs accessibility permission to paste content.</string>
        </dict>
        </plist>
        EOF
    
    - name: Copy icon to app bundle
      run: cp ReClip/Resources/AppIcon.icns ${{ env.APP_NAME }}.app/Contents/Resources/
    
    - name: Get version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF_NAME#v}
        else
          VERSION="dev-$(echo ${{ github.sha }} | cut -c1-7)"
        fi
        VERSION=$(echo "$VERSION" | tr '/:' '_')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    
    - name: Install create-dmg
      run: brew install create-dmg
    
    - name: Create DMG
      run: |
        create-dmg \
          --volname "${{ env.APP_NAME }}" \
          --volicon "ReClip/Resources/AppIcon.icns" \
          --window-pos 200 120 \
          --window-size 660 400 \
          --icon-size 100 \
          --icon "${{ env.APP_NAME }}.app" 180 170 \
          --hide-extension "${{ env.APP_NAME }}.app" \
          --app-drop-link 480 170 \
          "${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg" \
          "${{ env.APP_NAME }}.app" || {
            echo "DMG creation failed, creating ZIP instead"
            zip -r "${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip" "${{ env.APP_NAME }}.app"
          }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}-macOS
        path: |
          ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.dmg
          ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip
    
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: ReClip-macOS
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ReClip-*.dmg
          ReClip-*.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
